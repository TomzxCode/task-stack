name: Build Tauri apps and release

on:
  # Manually trigger a build/release from the Actions tab.
  workflow_dispatch:
  # Or push a tag like `tauri` / `tauri-v0.1.0`.
  push:
    tags:
      - "tauri*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Create (or recreate) the "tauri" draft release
        uses: actions/github-script@v7
        id: create-release
        with:
          script: |
            const tag = 'tauri';
            const { owner, repo } = context.repo;

            // Remove any existing release + tag so the build always publishes
            // a fresh "tauri" release.
            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: existing.data.id });
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
            } catch (e) {
              if (e.status !== 404 && e.status !== 422) throw e;
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: 'Task Stack (Tauri)',
              body: 'Automated Tauri build of Task Stack. Download the asset for your platform below.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # The extra targets are only needed for the macOS matrix entries.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build and upload assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish the "tauri" release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
